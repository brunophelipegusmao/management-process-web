<div class="min-h-screen flex bg-gray-50">

  <!-- Sidebar -->
  <aside class="w-64 bg-mulim-azul flex flex-col shrink-0">

    <!-- Logo -->
    <div class="h-16 flex items-center px-6 border-b border-white/10">
      <img src="/logo.svg" alt="Mulim Advogados" class="h-8 w-auto" />
    </div>

    <!-- Nav -->
    <nav class="flex-1 px-3 py-4 overflow-y-auto" aria-label="Navegação principal">
      <ul class="flex flex-col gap-1">
        @for (item of navItems; track item.path) {
          <li>
            <a
              [routerLink]="item.path"
              routerLinkActive="bg-white/15 text-white"
              [routerLinkActiveOptions]="{ exact: item.path === '/dashboard' }"
              class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-white/70 hover:bg-white/10 hover:text-white transition-colors text-sm font-medium focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-mulim-ouro"
            >
              <span aria-hidden="true">{{ item.icon }}</span>
              {{ item.label }}
            </a>
          </li>
        }
      </ul>
    </nav>

    <!-- User + logout -->
    <div class="p-4 border-t border-white/10">
      @if (user(); as u) {
        <p class="text-white/50 text-xs truncate mb-2">{{ u.name }}</p>
      }
      <button
        (click)="logout()"
        class="w-full text-left text-white/70 hover:text-white text-sm px-3 py-2 rounded-lg hover:bg-white/10 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-mulim-ouro"
      >
        Sair
      </button>
    </div>

  </aside>

  <!-- Conteúdo principal -->
  <main class="flex-1 flex flex-col min-w-0 overflow-hidden">
    <router-outlet />
  </main>

</div>
