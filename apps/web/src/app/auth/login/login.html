<div class="min-h-screen flex items-center justify-center bg-mulim-azul px-4">
  <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-8">

    <div class="flex justify-center mb-8">
      <img src="/logo.svg" alt="Mulim Advogados" class="h-12 w-auto" />
    </div>

    <h1 class="text-2xl font-bold text-mulim-azul text-center mb-6">
      Acessar o sistema
    </h1>

    <!-- Erro global da API -->
    @if (errorMessage()) {
      <div role="alert" class="mb-4 rounded-lg bg-red-50 border border-red-200 px-4 py-3 text-sm text-red-700">
        {{ errorMessage() }}
      </div>
    }

    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4" novalidate>

      <!-- E-mail -->
      <div class="flex flex-col gap-1">
        <label for="email" class="text-sm font-medium text-gray-700">E-mail</label>
        <input
          id="email"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="seu@email.com"
          [class.border-red-400]="isFieldInvalid('email')"
          class="border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-mulim-azul"
          aria-describedby="email-error"
        />
        @if (isFieldInvalid('email')) {
          <span id="email-error" class="text-xs text-red-600" role="alert">
            {{ getFieldError('email') }}
          </span>
        }
      </div>

      <!-- Senha -->
      <div class="flex flex-col gap-1">
        <label for="password" class="text-sm font-medium text-gray-700">Senha</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="••••••••"
          [class.border-red-400]="isFieldInvalid('password')"
          class="border border-gray-300 rounded-lg px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-mulim-azul"
          aria-describedby="password-error"
        />
        @if (isFieldInvalid('password')) {
          <span id="password-error" class="text-xs text-red-600" role="alert">
            {{ getFieldError('password') }}
          </span>
        }
      </div>

      <!-- Lembrar e-mail -->
      <div class="flex items-center gap-2">
        <input
          id="rememberEmail"
          type="checkbox"
          formControlName="rememberEmail"
          class="h-4 w-4 rounded border-gray-300 accent-mulim-azul cursor-pointer"
        />
        <label for="rememberEmail" class="text-sm text-gray-600 cursor-pointer select-none">
          Lembrar e-mail
        </label>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        [disabled]="loading()"
        class="mt-2 bg-mulim-azul text-white font-bold py-2.5 rounded-lg hover:bg-mulim-azul/90 transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-mulim-ouro disabled:opacity-60 disabled:cursor-not-allowed flex items-center justify-center gap-2"
      >
        @if (loading()) {
          <svg class="animate-spin h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" aria-hidden="true">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
          </svg>
          Entrando...
        } @else {
          Entrar
        }
      </button>

    </form>

    <div class="mt-6 text-center">
      <a routerLink="/home" class="text-sm text-gray-500 hover:text-mulim-azul hover:underline transition-colors">
        Voltar ao site
      </a>
    </div>

  </div>
</div>
