<div
  role="status"
  aria-live="polite"
  aria-atomic="false"
  class="fixed bottom-4 right-4 z-50 flex flex-col gap-2 max-w-sm w-full pointer-events-none"
>
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="pointer-events-auto flex items-start gap-3 rounded-lg px-4 py-3 shadow-lg text-white text-sm font-medium transition-all"
      [class.bg-green-600]="toast.type === 'success'"
      [class.bg-destructive]="toast.type === 'error'"
      [class.bg-mulim-azul]="toast.type === 'info'"
    >
      <span class="flex-1">{{ toast.message }}</span>
      <button
        (click)="toastService.dismiss(toast.id)"
        aria-label="Fechar notificação"
        class="shrink-0 opacity-70 hover:opacity-100 transition-opacity focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-white focus-visible:ring-offset-1"
      >
        ✕
      </button>
    </div>
  }
</div>
