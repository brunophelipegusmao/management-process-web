<div class="header-wrapper fixed top-0 left-0 right-0 z-50">

  <header class="h-16 md:h-20 flex items-center px-5 md:px-10 w-full max-w-6xl mx-auto">

    <!-- Logo → home -->
    <a routerLink="/"
       aria-label="Página inicial — Mulim Advogados Associados"
       class="header-logo shrink-0 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-mulim-ouro">
      <img src="/logo.svg" alt="" class="w-full h-auto" />
    </a>

    <!-- Nav desktop: direita — assimetria intencional -->
    <nav class="header-nav ml-auto" aria-label="Navegação principal">
      <ul class="flex items-center gap-10">
        <li>
          <a routerLink="/" routerLinkActive="nav-active" [routerLinkActiveOptions]="{exact: true}"
             class="nav-link" focus-visible:outline-none>Início</a>
        </li>
        <li>
          <a routerLink="/about" routerLinkActive="nav-active"
             class="nav-link">Sobre</a>
        </li>
        <li>
          <a routerLink="/contact" routerLinkActive="nav-active"
             class="nav-link">Contato</a>
        </li>
      </ul>
    </nav>

    <!-- Hambúrguer mobile -->
    <button
      class="hamburger ml-auto md:hidden focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-mulim-ouro rounded-sm"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-label="Abrir menu"
      aria-controls="mobile-menu"
    >
      <span class="ham-bar" [class.bar-top-open]="menuOpen()"></span>
      <span class="ham-bar" [class.opacity-0]="menuOpen()"></span>
      <span class="ham-bar" [class.bar-bottom-open]="menuOpen()"></span>
    </button>

  </header>

  <!-- Menu mobile -->
  @if (menuOpen()) {
    <nav id="mobile-menu" class="mobile-menu" aria-label="Navegação mobile">
      <ul class="mobile-nav-list">
        <li>
          <a routerLink="/" routerLinkActive="mobile-nav-active" [routerLinkActiveOptions]="{exact: true}"
             class="mobile-nav-link" (click)="toggleMenu()">Início</a>
        </li>
        <li>
          <a routerLink="/about" routerLinkActive="mobile-nav-active"
             class="mobile-nav-link" (click)="toggleMenu()">Sobre</a>
        </li>
        <li>
          <a routerLink="/contact" routerLinkActive="mobile-nav-active"
             class="mobile-nav-link" (click)="toggleMenu()">Contato</a>
        </li>
      </ul>
    </nav>
  }

</div>
