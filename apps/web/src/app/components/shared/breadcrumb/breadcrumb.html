@if (crumbs().length > 0) {
  <nav aria-label="Navegação estrutural" class="mb-4">
    <ol class="flex items-center gap-1.5 flex-wrap">
      @for (crumb of crumbs(); track crumb.path; let last = $last) {
        <li class="flex items-center gap-1.5">
          @if (!last && crumb.path) {
            <a
              [routerLink]="crumb.path"
              class="font-mono text-[0.6rem] tracking-widest uppercase text-foreground/40 hover:text-mulim-ouro transition-colors focus-visible:outline-2 focus-visible:outline-mulim-ouro focus-visible:outline-offset-1"
            >{{ crumb.label }}</a>
            <span aria-hidden="true" class="font-mono text-[0.6rem] text-foreground/20">/</span>
          } @else {
            <span class="font-mono text-[0.6rem] tracking-widest uppercase text-foreground/70">
              {{ crumb.label }}
            </span>
          }
        </li>
      }
    </ol>
  </nav>
}
