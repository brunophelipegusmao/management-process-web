<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <title>Mulim Advogados Associados</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-image" href="logo.svg">

  <!-- Dark mode inline: aplica a classe antes do Angular bootar, evitando FOUC -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        var dark = t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (dark) document.documentElement.classList.add('dark');
      } catch (_) {}
    })();
  </script>

  <!-- Fontes: preconnect + link não-bloqueante (substitui @import no CSS) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anonymous+Pro:ital,wght@0,400;0,700;1,400;1,700&family=Source+Sans+3:ital,wght@0,200..900;1,200..900&display=swap">
</head>
<body>
  <app-root></app-root>
</body>
</html>
